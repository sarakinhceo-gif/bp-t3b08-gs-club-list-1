            font-weight: 700;
            float: left;
            margin: 0.15em 0.2em 0 0;
            color: #d4af37;
            line-height: 0.85;
        }
        /* ===== NAVIGATION ===== */
        nav {

            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        nav .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }
        nav .logo {
            font-family: 'Noto Serif KR', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: #f5f0e8;
            letter-spacing: 0.05em;
        }
        nav .logo span {
            color: #d4af37;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 32px;
            align-items: center;
        }
        nav ul li a {
            font-size: 0.9rem;
            color: #c8c0b0;
            font-weight: 500;
            letter-spacing: 0.03em;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }
        nav ul li a:hover,
        nav ul li a.active {
            color: #f5f0e8;
            border-bottom-color: #d4af37;
        }
        nav ul li a.active {
            color: #d4af37;
        }
        /* Hamburger Menu */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            padding: 4px;
        }
        .hamburger span {
            width: 28px;
            height: 2px;
            background-color: #f5f0e8;
            transition: all 0.3s ease;
            border-radius: 2px;
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }
            nav ul {
                display: none;
                position: absolute;
                top: 64px;
                left: 0;
                right: 0;
                background: rgba(10, 10, 10, 0.99);
                flex-direction: column;
                padding: 24px;
                gap: 16px;
                border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            }
            nav ul.show {
                display: flex;
            }
            nav ul li a {
                font-size: 1rem;
                padding: 12px 0;
                display: block;
            }
        }
        /* ===== HERO ===== */
        .hero {
            padding: 80px 0 60px;
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
        }

            font-size: 3.2rem;
            margin-bottom: 0.5rem;
        }

            color: #a09888;
            letter-spacing: 0.05em;

        }

            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 24px auto;
        }
        /* ===== SECTION ===== */
        .section {
            padding: 60px 0;
        }
        .section-title {
            text-align: center;
            margin-bottom: 48px;
        }
        .section-title h2 {
            position: relative;
            display: inline-block;
        }
        .section-title h2::after {
            content: '';
            display: block;
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37);
            margin: 12px auto 0;
        }
        /* ===== INFO GRID ===== */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 32px;
            margin: 40px 0;
        }
        .info-card {
            background: linear-gradient(145deg, #121212, #1a1a1a);
            border: 1px solid rgba(212, 175, 55, 0.12);
            border-radius: 12px;
            padding: 32px;
            transition: all 0.4s ease;
        }
        .info-card:hover {
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }
        .info-card .card-icon {
            font-size: 2rem;
            margin-bottom: 16px;
            display: block;
        }
        .info-card h3 {
            font-size: 1.3rem;
            margin-bottom: 12px;
            color: #f5f0e8;
        }
        .info-card p {
            font-size: 0.95rem;
            color: #b0a898;
            margin-bottom: 8px;
        }
        .info-card .detail-list {
            list-style: none;
            margin-top: 16px;
        }
        .info-card .detail-list li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.08);
            font-size: 0.9rem;
            color: #c8c0b0;
            display: flex;
            justify-content: space-between;
        }
        .info-card .detail-list li:last-child {
            border-bottom: none;
        }
        .info-card .detail-list li span.label {
            color: #a09888;
            font-weight: 300;
        }
        .info-card .detail-list li span.value {
            color: #f5f0e8;
            font-weight: 500;
        }
        /* ===== TABLE ===== */
        .info-table-wrap {
            overflow-x: auto;
            margin: 40px 0;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.12);
        }
        .info-table {
            width: 100%;
            border-collapse: collapse;
            background: #121212;
        }
        .info-table th,
        .info-table td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(212, 175, 55, 0.08);
            font-size: 0.9rem;
        }
        .info-table th {
            background: rgba(212, 175, 55, 0.08);
            color: #d4af37;
            font-weight: 600;
            letter-spacing: 0.04em;
        }
        .info-table td {
            color: #c8c0b0;
        }
        .info-table tr:hover td {
            background: rgba(212, 175, 55, 0.03);
        }
        /* ===== FAQ ===== */
        .faq-list {
            max-width: 800px;
            margin: 0 auto;
        }
        .faq-item {
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            padding: 20px 0;
        }
        .faq-item summary {
            font-size: 1.05rem;
            font-weight: 600;
            color: #f5f0e8;
            cursor: pointer;
            padding: 8px 0;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .faq-item summary::-webkit-details-marker {
            display: none;
        }
        .faq-item summary::after {
            content: '+';
            font-size: 1.4rem;
            color: #d4af37;
            transition: transform 0.3s ease;
        }
        .faq-item[open] summary::after {
            content: '−';
            transform: rotate(180deg);
        }
        .faq-item .answer {
            padding: 16px 0 8px;
            color: #b0a898;
            font-size: 0.95rem;
            line-height: 1.8;
        }
        /* ===== CTA ===== */
        .cta-section {
            text-align: center;

            color: #0a0a0a;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 50px;
            letter-spacing: 0.04em;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background: linear-gradient(135deg, #f5d76e, #d4af37);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.3);
        }

            .section {

        }
        @media (max-width: 480px) {
